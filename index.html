<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日出康城實時交通看板</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 15px; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .title { font-size: 26px; font-weight: bold; color: #d0bfff; }
        .clock { font-size: 30px; font-weight: bold; color: #00e5ff; }
        .section-title { font-size: 20px; color: #aaa; background: #111; padding: 5px 10px; border-left: 5px solid #fff; margin-top: 15px; }
        .section-title.mtr-sec { border-left-color: #7d4199; }
        .section-title.bus-sec { border-left-color: #ff9f0a; }
        .eta-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding: 12px 5px; }
        .route-badge { font-size: 32px; font-weight: bold; width: 90px; text-align: center; border-radius: 5px; padding: 2px 0; }
        .mtr-badge { color: #fff; background-color: #7d4199; font-size: 24px; }
        .kmb-badge { color: #fff; background-color: #ff3b30; }
        .ctb-badge { color: #000; background-color: #ffd60a; }
        .destination { font-size: 22px; flex-grow: 1; margin-left: 15px; }
        .time-left { font-size: 30px; font-weight: bold; color: #30d158; text-align: right; min-width: 120px; }
        .status { text-align: center; color: #666; font-size: 14px; margin-top: 25px; }
    </style>
</head>
<body>

<div class="header">
    <div class="title">日出康城 LOHAS Park</div>
    <div class="clock" id="current-time">00:00:00</div>
</div>

<div class="section-title mtr-sec">港鐵將軍澳綫 (康城站)</div>
<div id="mtr-list">正在獲取港鐵班次...</div>

<div class="section-title bus-sec">康城開出巴士 (實時整合)</div>
<div id="bus-list">正在獲取巴士班次...</div>

<div class="status" id="update-status">正在初始化...</div>

<script>
    // 1. 實時時鐘
    function updateClock() {
        var now = new Date();
        var hrs = now.getHours(), mins = now.getMinutes(), secs = now.getSeconds();
        if (hrs < 10) hrs = "0" + hrs; if (mins < 10) mins = "0" + mins; if (secs < 10) secs = "0" + secs;
        document.getElementById('current-time').innerText = hrs + ":" + mins + ":" + secs;
    }
    setInterval(updateClock, 1000); updateClock();

    // 萬能相容時間轉換器
    function parseToSafeDate(dateStr) {
        if (!dateStr) return new Date();
        var tPart = dateStr.split('+')[0]; 
        var cleanStr = tPart.replace('T', ' ').replace(/-/g, '/');
        return new Date(cleanStr);
    }

    // 換用針對香港政府開放數據專用的 CORS Proxy 轉發引擎
    var PROXY = "https://cors-anywhere.herokuapp.com/";

    // 2. 港鐵獲取
    function fetchMTR() {
        var mtrList = document.getElementById('mtr-list');
        var targetUrl = 'https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=TKO&sta=LHP';
        
        var xhr = new XMLHttpRequest();
        xhr.open('GET', PROXY + targetUrl, true);
        // 設定專用 Header 模擬正常瀏覽器要求
        xhr.setRequestHeader("X-Requested-With", "XMLHttpRequest");
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var json = JSON.parse(xhr.responseText);
                        var schedule = json.data['TKO-LHP'].UP;
                        if (!schedule || schedule.length === 0) {
                            mtrList.innerHTML = '<div class="eta-row"><div class="destination">非行車時間 / 暫無班次</div></div>';
                            return;
                        }
                        var html = '';
                        var maxRows = schedule.length > 2 ? 2 : schedule.length;
                        for (var i = 0; i < maxRows; i++) {
                            var train = schedule[i];
                            var diffMins = train.ttnt ? parseInt(train.ttnt) : Math.max(0, Math.floor((parseToSafeDate(train.time) - new Date()) / 1000 / 60));
                            var dest = train.dest === "NOP" ? "北角" : (train.dest === "TIK" ? "調景嶺" : train.dest);
                            var timeText = diffMins <= 0 ? "即將到站" : diffMins + " 分鐘";
                            html += '<div class="eta-row"><div class="route-badge mtr-badge">MTR</div><div class="destination">往 ' + dest + '</div><div class="time-left">' + timeText + '</div></div>';
                        }
                        mtrList.innerHTML = html;
                    } catch (e) { 
                        mtrList.innerHTML = '<div class="eta-row"><div class="destination" style="color:#aaa;">港鐵班次刷新中...</div></div>'; 
                    }
                } else if (xhr.status === 402 || xhr.status === 403) {
                    mtrList.innerHTML = '<div class="eta-row"><div class="destination" style="color:#ffcc00;">請先至電腦端進行 Proxy 授權</div></div>';
                }
            }
        }; xhr.send();
    }

    // 3. 巴士配置
    var BUS_CONFIG = [
        { company: 'kmb', route: '98', url: 'https://data.etabus.gov.hk/v1/transport/kmb/eta/B86A414064EE18D6/98/O', dest: '牛頭角站' },
        { company: 'ctb', route: '790', url: 'https://rt.data.gov.hk/v1/transport/citybus/eta/ctb/003253/790', dest: '尖沙咀東' },
        { company: 'ctb', route: '795X', url: 'https://rt.data.gov.hk/v1/transport/citybus/eta/ctb/003253/795X', dest: '蘇屋 (旺角)' },
        { company: 'ctb', route: '793', url: 'https://rt.data.gov.hk/v1/transport/citybus/eta/ctb/003253/793', dest: '蘇屋 (九龍灣)' }
    ];

    function fetchBus() {
        var busList = document.getElementById('bus-list');
        var allEtas = [];
        var completedRequests = 0;

        for (var i = 0; i < BUS_CONFIG.length; i++) {
            (function(config) {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', PROXY + config.url, true);
                xhr.setRequestHeader("X-Requested-With", "XMLHttpRequest");
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            try {
                                var json = JSON.parse(xhr.responseText);
                                var list = json.data || [];
                                if (config.company === 'ctb') {
                                    list = list.filter(function(item) { return item.dir === 'O' && item.eta; });
                                } else {
                                    list = list.filter(function(item) { return item.eta; });
                                }
                                if (list.length > 0) {
                                    var targetTime = parseToSafeDate(list[0].eta);
                                    var diffMins = Math.max(0, Math.floor((targetTime - new Date()) / 1000 / 60));
                                    allEtas.push({ company: config.company, route: config.route, dest: config.dest, mins: diffMins });
                                }
                            } catch(e) {}
                        }
                        completedRequests++;
                        if (completedRequests === BUS_CONFIG.length) {
                            allEtas.sort(function(a, b) { return a.mins - b.mins; });
                            if (allEtas.length === 0) {
                                busList.innerHTML = '<div class="eta-row"><div class="destination">暫無巴士班次</div></div>';
                                return;
                            }
                            var html = '';
                            for (var j = 0; j < allEtas.length; j++) {
                                var bus = allEtas[j];
                                var badgeClass = bus.company === 'kmb' ? 'kmb-badge' : 'ctb-badge';
                                var timeText = bus.mins === 0 ? "到站中" : bus.mins + " 分鐘";
                                html += '<div class="eta-row">' +
                                        '<div class="route-badge ' + badgeClass + '">' + bus.route + '</div>' +
                                        '<div class="destination">往 ' + bus.dest + '</div>' +
                                        '<div class="time-left">' + timeText + '</div>' +
                                        '</div>';
                            }
                            busList.innerHTML = html;
                            var now = new Date();
                            document.getElementById('update-status').innerText = '最後更新: ' + now.toLocaleTimeString();
                        }
                    }
                }; xhr.send();
            })(BUS_CONFIG[i]);
        }
    }

    function updateAllData() {
        document.getElementById('update-status').innerText = '正在更新數據...';
        fetchMTR();
        fetchBus();
    }

    updateAllData();
    setInterval(updateAllData, 30000);
</script>

</body>
</html>
