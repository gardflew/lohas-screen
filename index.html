<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日出康城實時交通看板 (Android 5.0 終極兼容版)</title>

<style>
    body {
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 15px;
        overflow: hidden;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 3px solid #333;
        padding-bottom: 10px;
        margin-bottom: 15px;
    }

    .title {
        font-size: 26px;
        font-weight: bold;
        color: #d0bfff;
    }

    .clock {
        font-size: 30px;
        font-weight: bold;
        color: #00e5ff;
    }

    .section-title {
        font-size: 20px;
        color: #aaa;
        background: #111;
        padding: 5px 10px;
        border-left: 5px solid #fff;
        margin-top: 15px;
    }

    .mtr-sec {
        border-left-color: #7d4199;
    }

    .bus-sec {
        border-left-color: #ff9f0a;
    }

    .eta-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #222;
        padding: 10px 5px;
    }

    .route-badge {
        font-size: 28px;
        font-weight: bold;
        width: 95px;
        text-align: center;
        border-radius: 5px;
        padding: 2px 0;
    }

    .mtr-badge {
        color: #fff;
        background: #7d4199;
        font-size: 24px;
    }

    .kmb-badge {
        color: #fff;
        background: #ff3b30;
    }

    .ctb-badge {
        color: #000;
        background: #ffd60a;
    }

    .destination {
        font-size: 22px;
        flex-grow: 1;
        margin-left: 15px;
    }

    .time-left {
        font-size: 28px;
        font-weight: bold;
        color: #30d158;
        text-align: right;
        min-width: 140px;
    }

    .no-eta {
        color: #aaa;
        font-size: 24px;
    }

    .status {
        text-align: center;
        color: #666;
        font-size: 14px;
        margin-top: 25px;
    }

    .error {
        color: #ff6b6b;
    }

    .muted {
        color: #aaa;
    }
</style>
</head>

<body>

<div class="header">
    <div class="title">日出康城 LOHAS Park</div>
    <div class="clock" id="current-time">00:00:00</div>
</div>

<!-- 獨立時鐘：最安全的舊語法，確保時鐘一定會走 -->
<script>
    function padStartZero(val) {
        var str = String(val);
        return str.length < 2 ? "0" + str : str;
    }

    function updateClockOnly() {
        var now = new Date();
        var timeText = padStartZero(now.getHours()) + ":" +
                       padStartZero(now.getMinutes()) + ":" +
                       padStartZero(now.getSeconds());

        var clockElement = document.getElementById("current-time");
        if (clockElement) {
            clockElement.innerText = timeText;
        }
    }

    updateClockOnly();
    setInterval(updateClockOnly, 1000);
</script>

<div class="section-title mtr-sec">港鐵將軍澳綫（康城站）</div>
<div id="mtr-list">
    <div class="eta-row">
        <div class="destination muted">正在獲取港鐵班次...</div>
    </div>
</div>

<div class="section-title bus-sec">康城開出巴士</div>
<div id="bus-list">
    <div class="eta-row">
        <div class="destination muted">正在獲取巴士班次...</div>
    </div>
</div>

<div class="status" id="update-status">正在初始化...</div>

<script>
/************************************************************
 * 1. 錯誤捕獲（會在網頁底部跳出提示，方便 debug）
 ************************************************************/
window.onerror = function(message, source, lineno, colno, error) {
    var status = document.getElementById("update-status");
    if (status) {
        status.innerText = "JS Error: " + message + " (Line " + lineno + ")";
    }
};

/************************************************************
 * 2. 基礎配置 (全部 var 宣告)
 ************************************************************/
var REFRESH_INTERVAL = 30000;
var MTR_API = "https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=TKL&sta=LHP";

var BUS_ROUTES = [
    { company: "kmb", route: "98", serviceType: "1", dir: "O", dest: "將軍澳轉車站 / 牛頭角站", order: 1 },
    { company: "kmb", route: "290X", serviceType: "1", dir: "O", dest: "荃灣西站", order: 2 },
    { company: "kmb", route: "298X", serviceType: "1", dir: "O", dest: "美孚", order: 3 },
    { company: "ctb", route: "790", stopId: "003329", dir: "O", dest: "尖沙咀東", order: 4 },
    { company: "ctb", route: "795", stopId: "003329", dir: "O", dest: "長沙灣", order: 5 },
    { company: "ctb", route: "797", stopId: "003329", dir: "O", dest: "新蒲崗", order: 6 }
];

var LOHAS_KEYWORDS = [
    "康城", "日出", "lohas", "lohas park", "the lohas", "beaumount", 
    "the beaumount", "峻瀅", "首都", "the capitol", "malibu", 
    "wings at sea", "海翩匯", "oscar", "清水灣半島", "mega plus", 
    "wan po", "wan o", "le prestige", "領都", "緻藍天", "shaw studios"
];

var kmbStopListCache = null;

/************************************************************
 * 3. 基礎工具與傳統 AJAX 封裝 (取代 Fetch 以相容 Android 5.0)
 ************************************************************/
function showMessage(elementId, message, isError) {
    var element = document.getElementById(elementId);
    if (!element) return;
    var className = isError ? "destination error" : "destination muted";
    element.innerHTML = '<div class="eta-row"><div class="' + className + '">' + message + '</div></div>';
}

function parseEtaTime(value) {
    if (!value) return null;
    var date = new Date(value);
    if (isNaN(date.getTime())) return null;
    return date;
}

function getMinutesLeft(etaTime) {
    var targetTime = parseEtaTime(etaTime);
    if (!targetTime) return null;
    return Math.max(0, Math.floor((targetTime - new Date()) / 1000 / 60));
}

function formatMinutes(mins, type) {
    if (mins === null || mins === undefined) return "暫無班次";
    if (mins <= 0) return type === "bus" ? "到站中" : "即將到站";
    return mins + " 分鐘";
}

function containsLohasKeyword(text) {
    var lower = String(text || "").toLowerCase();
    for (var i = 0; i < LOHAS_KEYWORDS.length; i++) {
        if (lower.indexOf(LOHAS_KEYWORDS[i].toLowerCase()) !== -1) {
            return true;
        }
    }
    return false;
}

// 使用 XMLHttpRequest 取代 fetch 避免 Android 5.0 核心不支援
function getJsonViaAjax(url) {
    return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url + (url.indexOf("?") === -1 ? "?" : "&") + "_t=" + new Date().getTime(), true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        resolve(data);
                    } catch (e) {
                        reject(new Error("JSON Parse Error"));
                    }
                } else {
                    reject(new Error("HTTP Error " + xhr.status));
                }
            }
        };
        xhr.send();
    });
}

/************************************************************
 * 4. 港鐵數據處理
 ************************************************************/
function fetchMTR() {
    getJsonViaAjax(MTR_API)
        .then(function(json) {
            if (!json || !json.data) {
                showMessage("mtr-list", "港鐵資料格式異常", true);
                return;
            }
            var keys = [];
            for (var k in json.data) {
                if (json.data.hasOwnProperty(k)) keys.push(k);
            }
            if (keys.length === 0) {
                showMessage("mtr-list", "港鐵暫無資料", true);
                return;
            }
            var stationData = json.data[keys[0]];
            var schedule = [];

            if (stationData.UP && stationData.UP.length > 0) {
                schedule = stationData.UP;
            } else if (stationData.DOWN && stationData.DOWN.length > 0) {
                schedule = stationData.DOWN;
            }

            if (schedule.length === 0) {
                showMessage("mtr-list", "非行車時間 / 暫無港鐵班次");
                return;
            }

            var destinationMap = { "NOP": "北角", "TIK": "調景嶺", "POA": "寶琳", "LHP": "康城" };
            var html = "";
            var displayCount = Math.min(schedule.length, 3);

            for (var i = 0; i < displayCount; i++) {
                var train = schedule[i];
                var mins = (train.ttnt !== undefined && train.ttnt !== "") ? parseInt(train.ttnt, 10) : getMinutesLeft(train.time);
                if (mins === null || isNaN(mins)) mins = 0;
                var dest = destinationMap[train.dest] || train.dest || "未能確認";

                html += '<div class="eta-row">' +
                        '<div class="route-badge mtr-badge">MTR</div>' +
                        '<div class="destination">往 ' + dest + '</div>' +
                        '<div class="time-left">' + formatMinutes(mins, "mtr") + '</div>' +
                        '</div>';
            }
            document.getElementById("mtr-list").innerHTML = html;
        })
        .catch(function() {
            showMessage("mtr-list", "港鐵資料更新失敗", true);
        });
}

/************************************************************
 * 5. 巴士數據處理與渲染
 ************************************************************/
function createNoEtaRoute(routeConfig) {
    return {
        company: routeConfig.company,
        route: routeConfig.route,
        dest: routeConfig.dest,
        mins: null,
        order: routeConfig.order,
        stopId: routeConfig.stopId || null
    };
}

function renderBusList(busList) {
    busList.sort(function(a, b) { return a.order - b.order; });

    var html = "";
    for (var i = 0; i < busList.length; i++) {
        var bus = busList[i];
        var badgeClass = bus.company === "kmb" ? "kmb-badge" : "ctb-badge";
        var timeClass = (bus.mins === null || bus.mins === undefined) ? "time-left no-eta" : "time-left";

        html += '<div class="eta-row">' +
                '<div class="route-badge ' + badgeClass + '">' + bus.route + '</div>' +
                '<div class="destination">往 ' + bus.dest + '</div>' +
                '<div class="' + timeClass + '">' + formatMinutes(bus.mins, "bus") + '</div>' +
                '</div>';
    }
    document.getElementById("bus-list").innerHTML = html;
}

/************************************************************
 * 6. 九巴自動配對站點（精準鎖定方向過濾）
 ************************************************************/
function getKmbStopList() {
    if (kmbStopListCache) return Promise.resolve(kmbStopListCache);
    return getJsonViaAjax("https://data.etabus.gov.hk/v1/transport/kmb/stop")
        .then(function(json) {
            kmbStopListCache = (json && Array.isArray(json.data)) ? json.data : [];
            return kmbStopListCache;
        });
}

function findKmbCandidateStops(routeConfig) {
    var targetDirection = routeConfig.dir === "O" ? "outbound" : "inbound";
    var url = "https://data.etabus.gov.hk/v1/transport/kmb/route-stop/" + routeConfig.route + "/" + targetDirection + "/" + routeConfig.serviceType;

    return Promise.all([getKmbStopList(), getJsonViaAjax(url)])
        .then(function(results) {
            var stopList = results[0];
            var routeStops = (results[1] && Array.isArray(results[1].data)) ? results[1].data : [];

            var stopMap = {};
            for (var i = 0; i < stopList.length; i++) {
                var s = stopList[i];
                if (s.stop) stopMap[s.stop] = s;
            }

            var mapped = [];
            var seenStops = {};
            for (var j = 0; j < routeStops.length; j++) {
                var rRow = routeStops[j];
                var sId = rRow.stop || rRow.stop_id;
                if (!sId || seenStops[sId]) continue;
                seenStops[sId] = true;

                var stopInfo = stopMap[sId] || {};
                mapped.push({
                    stop: sId,
                    name_tc: stopInfo.name_tc || "",
                    name_en: stopInfo.name_en || ""
                });
            }

            var candidates = [];
            for (var k = 0; k < mapped.length; k++) {
                if (containsLohasKeyword(mapped[k].name_tc + " " + mapped[k].name_en)) {
                    candidates.push(mapped[k]);
                }
            }

            return candidates.length > 0 ? candidates : mapped;
        })
        .catch(function() {
            return [];
        });
}

function fetchKmbEta(routeConfig, stopId) {
    var url = "https://data.etabus.gov.hk/v1/transport/kmb/eta/" + stopId + "/" + routeConfig.route + "/" + routeConfig.serviceType;
    return getJsonViaAjax(url)
        .then(function(json) {
            var rawList = (json && Array.isArray(json.data)) ? json.data : [];
            
            // 嚴格篩選符合方向的車次（過濾落客站）
            var list = [];
            for (var i = 0; i < rawList.length; i++) {
                var item = rawList[i];
                if (item && item.eta && item.dir === routeConfig.dir) {
                    list.push(item);
                }
            }

            if (list.length === 0) return null;

            list.sort(function(a, b) {
                var tA = parseEtaTime(a.eta);
                var tB = parseEtaTime(b.eta);
                return (tA && tB) ? tA - tB : 0;
            });

            var mins = getMinutesLeft(list[0].eta);
            if (mins === null) return null;

            return {
                company: "kmb",
                route: routeConfig.route,
                dest: routeConfig.dest,
                mins: mins,
                order: routeConfig.order,
                stopId: stopId
            };
        })
        .catch(function() {
            return null;
        });
}

function fetchOneKmbRoute(routeConfig) {
    return findKmbCandidateStops(routeConfig)
        .then(function(candidates) {
            if (candidates.length === 0) return createNoEtaRoute(routeConfig);
            
            // 傳統遞歸避免 for-of 造成老舊設備崩潰
            function tryNext(index) {
                if (index >= candidates.length) return createNoEtaRoute(routeConfig);
                return fetchKmbEta(routeConfig, candidates[index].stop)
                    .then(function(etaResult) {
                        if (etaResult) return etaResult;
                        return tryNext(index + 1);
                    });
            }
            return tryNext(0);
        });
}

/************************************************************
 * 7. 城巴固定站點（精準方向過濾）
 ************************************************************/
function fetchCitybusEta(routeConfig) {
    var url = "https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/" + routeConfig.stopId + "/" + routeConfig.route;
    return getJsonViaAjax(url)
        .then(function(json) {
            var rawList = (json && Array.isArray(json.data)) ? json.data : [];
            
            // 嚴格篩選城巴出發方向的數據
            var list = [];
            for (var i = 0; i < rawList.length; i++) {
                var item = rawList[i];
                if (item && item.eta && item.dir === routeConfig.dir) {
                    list.push(item);
                }
            }

            if (list.length === 0) return createNoEtaRoute(routeConfig);

            list.sort(function(a, b) {
                var tA = parseEtaTime(a.eta);
                var tB = parseEtaTime(b.eta);
                return (tA && tB) ? tA - tB : 0;
            });

            var mins = getMinutesLeft(list[0].eta);
            if (mins === null) return createNoEtaRoute(routeConfig);

            return {
                company: "ctb",
                route: routeConfig.route,
                dest: routeConfig.dest,
                mins: mins,
                order: routeConfig.order,
                stopId: routeConfig.stopId
            };
        })
        .catch(function() {
            return createNoEtaRoute(routeConfig);
        });
}

/************************************************************
 * 8. 巴士整合調度
 ************************************************************/
function fetchBus() {
    var promises = [];
    for (var i = 0; i < BUS_ROUTES.length; i++) {
        var rConfig = BUS_ROUTES[i];
        if (rConfig.company === "kmb") {
            promises.push(fetchOneKmbRoute(rConfig));
        } else if (rConfig.company === "ctb") {
            promises.push(fetchCitybusEta(rConfig));
        } else {
            promises.push(Promise.resolve(createNoEtaRoute(rConfig)));
        }
    }

    return Promise.all(promises)
        .then(function(results) {
            renderBusList(results);
        })
        .catch(function(err) {
            console.error(err);
        });
}

/************************************************************
 * 9. 全局週期更新
 ************************************************************/
function updateAllData() {
    var status = document.getElementById("update-status");
    if (status) status.innerText = "正在更新數據...";

    fetchMTR();
    fetchBus();

    var now = new Date();
    if (status) {
        status.innerText = "最後更新: " + padStartZero(now.getHours()) + ":" + padStartZero(now.getMinutes()) + ":" + padStartZero(now.getSeconds());
    }
}

// 啟動與定時器
updateAllData();
setInterval(updateAllData, REFRESH_INTERVAL);
</script>

</body>
</html>
