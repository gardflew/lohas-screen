<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日出康城實時交通看板</title>

<style>
    body {
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 15px;
        overflow: hidden;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 3px solid #333;
        padding-bottom: 10px;
        margin-bottom: 15px;
    }

    .title {
        font-size: 26px;
        font-weight: bold;
        color: #d0bfff;
    }

    .clock {
        font-size: 30px;
        font-weight: bold;
        color: #00e5ff;
    }

    .section-title {
        font-size: 20px;
        color: #aaa;
        background: #111;
        padding: 5px 10px;
        border-left: 5px solid #fff;
        margin-top: 15px;
    }

    .mtr-sec {
        border-left-color: #7d4199;
    }

    .bus-sec {
        border-left-color: #ff9f0a;
    }

    .eta-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #222;
        padding: 10px 5px;
    }

    .route-badge {
        font-size: 28px;
        font-weight: bold;
        width: 95px;
        text-align: center;
        border-radius: 5px;
        padding: 2px 0;
    }

    .mtr-badge {
        color: #fff;
        background: #7d4199;
        font-size: 24px;
    }

    .kmb-badge {
        color: #fff;
        background: #ff3b30;
    }

    .ctb-badge {
        color: #000;
        background: #ffd60a;
    }

    .destination {
        font-size: 22px;
        flex-grow: 1;
        margin-left: 15px;
    }

    .time-left {
        font-size: 28px;
        font-weight: bold;
        color: #30d158;
        text-align: right;
        min-width: 140px;
    }

    .no-eta {
        color: #aaa;
        font-size: 24px;
    }

    .status {
        text-align: center;
        color: #666;
        font-size: 14px;
        margin-top: 25px;
    }

    .error {
        color: #ff6b6b;
    }

    .muted {
        color: #aaa;
    }
</style>
</head>

<body>

<div class="header">
    <div class="title">日出康城 LOHAS Park</div>
    <div class="clock" id="current-time">00:00:00</div>
</div>

<script>
    function updateClockOnly() {
        var now = new Date();
        var hrs = now.getHours();
        var mins = now.getMinutes();
        var secs = now.getSeconds();
        
        if (hrs < 10) hrs = "0" + hrs;
        if (mins < 10) mins = "0" + mins;
        if (secs < 10) secs = "0" + secs;

        var timeText = hrs + ":" + mins + ":" + secs;
        var clockElement = document.getElementById("current-time");

        if (clockElement) {
            clockElement.innerText = timeText;
        }
    }

    updateClockOnly();
    setInterval(updateClockOnly, 1000);
</script>

<div class="section-title mtr-sec">港鐵將軍澳綫（康城站）</div>
<div id="mtr-list">
    <div class="eta-row">
        <div class="destination muted">正在獲取港鐵班次...</div>
    </div>
</div>

<div class="section-title bus-sec">康城開出巴士</div>
<div id="bus-list">
    <div class="eta-row">
        <div class="destination muted">正在獲取巴士班次...</div>
    </div>
</div>

<div class="status" id="update-status">正在初始化...</div>

<script>
/************************************************************
 * 1. 錯誤處理
 ************************************************************/
window.onerror = function(message, source, lineno, colno, error) {
    var status = document.getElementById("update-status");
    if (status) {
        status.innerText = "JavaScript Error: " + message + " at line " + lineno;
    }
    return false;
};

/************************************************************
 * 2. 基礎設定 (全 var 化)
 ************************************************************/
var REFRESH_INTERVAL = 30000;
var REQUEST_TIMEOUT = 12000;

// 是否啟用跨域代理，如需要可在此處加上前綴 (例如 "https://corsproxy.io/?url=" 或帶有授權的中轉站)
// 如果你電腦測試時有開代理，請把代理網址填在引號內，否則留空即可。
var PROXY_PREFIX = ""; 

var MTR_API = "https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=TKL&sta=LHP";

var BUS_ROUTES = [
    { company: "kmb", route: "290X", serviceType: "1", dest: "市區方向", order: 1 },
    { company: "kmb", route: "298X", serviceType: "1", dest: "市區方向", order: 2 },
    { company: "ctb", route: "790", stopId: "003329", dest: "尖沙咀東方向", order: 3 },
    { company: "ctb", route: "795", stopId: "003329", dest: "市區方向", order: 4 },
    { company: "ctb", route: "797", stopId: "003329", dest: "市區方向", order: 5 }
];

var LOHAS_KEYWORDS = [
    "康城", "日出", "lohas", "lohas park", "the lohas", "beaumount", "the beaumount",
    "峻瀅", "首都", "the capitol", "malibu", "wings at sea", "海翩匯", "oscar",
    "清水灣半島", "mega plus", "wan po", "wan o", "le prestige", "領都", "緻藍天", "shaw studios"
];

var kmbStopListCache = null;

/************************************************************
 * 3. 復古公共工具
 ************************************************************/
function showMessage(elementId, message, isError) {
    var element = document.getElementById(elementId);
    if (!element) return;
    var className = isError ? "destination error" : "destination muted";
    element.innerHTML = '<div class="eta-row"><div class="' + className + '">' + message + '</div></div>';
}

function parseEtaTime(value) {
    if (!value) return null;
    // 相容舊手機讀取含有 T 與 +08:00 的特殊時間字串
    var tPart = value.split('+')[0]; 
    var cleanStr = tPart.replace('T', ' ').replace(/-/g, '/');
    var date = new Date(cleanStr);
    if (isNaN(date.getTime())) {
        return null;
    }
    return date;
}

function getMinutesLeft(etaTime) {
    var targetTime = parseEtaTime(etaTime);
    if (!targetTime) return null;
    return Math.max(0, Math.floor((targetTime - new Date()) / 1000 / 60));
}

function formatMinutes(mins, type) {
    if (mins === null || mins === undefined) {
        return "暫無班次";
    }
    if (mins <= 0) {
        return type === "bus" ? "到站中" : "即將到站";
    }
    return mins + " 分鐘";
}

function containsLohasKeyword(text) {
    var lower = String(text || "").toLowerCase();
    for (var i = 0; i < LOHAS_KEYWORDS.length; i++) {
        if (lower.indexOf(LOHAS_KEYWORDS[i].toLowerCase()) !== -1) {
            return true;
        }
    }
    return false;
}

function getStopId(row) {
    return row.stop || row.stop_id || row.stopId || row.STOP_ID || "";
}

function getSeq(row) {
    return Number(row.seq || row.stop_seq || row.sequence || row.stopSeq || 999);
}

function removeDuplicateStops(stops) {
    var seen = {};
    var result = [];
    for (var i = 0; i < stops.length; i++) {
        var item = stops[i];
        if (item && item.stop) {
            if (!seen[item.stop]) {
                seen[item.stop] = true;
                result.push(item);
            }
        }
    }
    return result;
}

// 用傳統 XMLHttpRequest 代替不相容的 fetch/async/await
function legacyFetchJson(url, label, callback, errorCallback) {
    var xhr = new XMLHttpRequest();
    var fullUrl = PROXY_PREFIX ? PROXY_PREFIX + encodeURIComponent(url) : url;
    
    xhr.open("GET", fullUrl, true);
    xhr.timeout = REQUEST_TIMEOUT;
    
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    callback(data);
                } catch (e) {
                    errorCallback("JSON解析失敗");
                }
            } else {
                errorCallback("HTTP錯誤: " + xhr.status);
            }
        }
    };
    
    xhr.ontimeout = function() {
        errorCallback("請求超時");
    };
    
    xhr.onerror = function() {
        errorCallback("連線失敗");
    };
    
    xhr.send();
}

/************************************************************
 * 4. MTR 模組
 ************************************************************/
function fetchMTR(onComplete) {
    legacyFetchJson(MTR_API, "MTR", function(json) {
        if (!json || !json.data) {
            showMessage("mtr-list", "港鐵資料格式異常", true);
            if (onComplete) onComplete();
            return;
        }

        var stationKey = "";
        for (var key in json.data) {
            if (json.data.hasOwnProperty(key)) {
                stationKey = key;
                break;
            }
        }

        if (!stationKey) {
            showMessage("mtr-list", "港鐵暫無資料", true);
            if (onComplete) onComplete();
            return;
        }

        var stationData = json.data[stationKey];
        var schedule = [];

        if (stationData.UP && stationData.UP.length > 0) {
            schedule = stationData.UP;
        } else if (stationData.DOWN && stationData.DOWN.length > 0) {
            schedule = stationData.DOWN;
        }

        if (!schedule.length) {
            showMessage("mtr-list", "非行車時間 / 暫無港鐵班次");
            if (onComplete) onComplete();
            return;
        }

        var destinationMap = { NOP: "北角", TIK: "調景嶺", POA: "寶琳", LHP: "康城" };
        var html = '';
        var maxRows = schedule.length > 3 ? 3 : schedule.length;

        for (var i = 0; i < maxRows; i++) {
            var train = schedule[i];
            var mins;

            if (train.ttnt !== undefined && train.ttnt !== "") {
                mins = parseInt(train.ttnt, 10);
            } else {
                mins = getMinutesLeft(train.time);
            }

            if (mins === null || isNaN(mins)) mins = 0;
            var dest = destinationMap[train.dest] || train.dest || "未能確認";

            html += '<div class="eta-row">' +
                    '<div class="route-badge mtr-badge">MTR</div>' +
                    '<div class="destination">往 ' + dest + '</div>' +
                    '<div class="time-left">' + formatMinutes(mins, "mtr") + '</div>' +
                    '</div>';
        }

        document.getElementById("mtr-list").innerHTML = html;
        if (onComplete) onComplete();
    }, function(err) {
        showMessage("mtr-list", "港鐵資料更新失敗", true);
        if (onComplete) onComplete();
    });
}

/************************************************************
 * 5. 巴士顯示與整合引擎
 ************************************************************/
function createNoEtaRoute(routeConfig) {
    return {
        company: routeConfig.company,
        route: routeConfig.route,
        dest: routeConfig.dest,
        mins: null,
        order: routeConfig.order,
        stopId: routeConfig.stopId || null
    };
}

function renderBusList(busList) {
    // 傳統排序法
    var orderedList = [];
    for (var i = 0; i < busList.length; i++) {
        orderedList.push(busList[i]);
    }
    orderedList.sort(function(a, b) { return a.order - b.order; });

    var html = '';
    for (var j = 0; j < orderedList.length; j++) {
        var bus = orderedList[j];
        var badgeClass = bus.company === "kmb" ? "kmb-badge" : "ctb-badge";
        var timeClass = (bus.mins === null || bus.mins === undefined) ? "time-left no-eta" : "time-left";

        html += '<div class="eta-row">' +
                '<div class="route-badge ' + badgeClass + '">' + bus.route + '</div>' +
                '<div class="destination">往 ' + bus.dest + '</div>' +
                '<div class="' + timeClass + '">' + formatMinutes(bus.mins, "bus") + '</div>' +
                '</div>';
    }

    document.getElementById("bus-list").innerHTML = html;
}

// 獲取九巴全站車站快取 (改用傳統回呼函數)
function getKmbStopList(callback, errorCallback) {
    if (kmbStopListCache) {
        callback(kmbStopListCache);
        return;
    }
    legacyFetchJson("https://data.etabus.gov.hk/v1/transport/kmb/stop", "KMB STOP LIST", function(json) {
        kmbStopListCache = (json && Array.isArray(json.data)) ? json.data : [];
        callback(kmbStopListCache);
    }, errorCallback);
}

function buildKmbStopMap(stopList) {
    var map = {};
    for (var i = 0; i < stopList.length; i++) {
        var stopId = getStopId(stopList[i]);
        if (stopId) map[stopId] = stopList[i];
    }
    return map;
}

// 逐步處理多條巴士路線的異步整合器
function fetchBus(onComplete) {
    var busResults = [];
    var completedCount = 0;

    function checkAllComplete() {
        if (completedCount === BUS_ROUTES.length) {
            renderBusList(busResults);
            if (onComplete) onComplete();
        }
    }

    // 處理單條城巴固定的真實數據
    function processCitybus(routeConfig) {
        var url = "https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/" + routeConfig.stopId + "/" + routeConfig.route;
        legacyFetchJson(url, "CTB ETA", function(json) {
            var list = (json && Array.isArray(json.data)) ? json.data : [];
            var validList = [];
            for (var i = 0; i < list.length; i++) {
                if (list[i] && list[i].eta) validList.push(list[i]);
            }

            if (!validList.length) {
                busResults.push(createNoEtaRoute(routeConfig));
            } else {
                validList.sort(function(a, b) {
                    var tA = parseEtaTime(a.eta), tB = parseEtaTime(b.eta);
                    return (tA && tB) ? tA - tB : 0;
                });
                var mins = getMinutesLeft(validList[0].eta);
                busResults.push({
                    company: "ctb", route: routeConfig.route, dest: routeConfig.dest,
                    mins: mins, order: routeConfig.order, stopId: routeConfig.stopId
                });
            }
            completedCount++;
            checkAllComplete();
        }, function() {
            busResults.push(createNoEtaRoute(routeConfig));
            completedCount++;
            checkAllComplete();
        });
    }

    // 處理單條九巴自動搜尋數據
    function processKmb(routeConfig) {
        getKmbStopList(function(stopList) {
            var stopMap = buildKmbStopMap(stopList);
            var directions = ["outbound", "inbound"];
            var dirCompleted = 0;
            var allRouteStops = [];

            function queryKmbEta() {
                var mapped = [];
                for (var i = 0; i < allRouteStops.length; i++) {
                    var row = allRouteStops[i];
                    var sId = getStopId(row);
                    var sInfo = stopMap[sId] || {};
                    mapped.push({
                        stop: sId, seq: getSeq(row),
                        name_tc: sInfo.name_tc || "", name_en: sInfo.name_en || ""
                    });
                }
                mapped = removeDuplicateStops(mapped);
                
                var candidates = [];
                for (var j = 0; j < mapped.length; j++) {
                    if (containsLohasKeyword(mapped[j].name_tc + " " + mapped[j].name_en)) {
                        candidates.push(mapped[j]);
                    }
                }
                if (!candidates.length) candidates = mapped.sort(function(a,b){return a.seq - b.seq;});

                if (!candidates.length) {
                    busResults.push(createNoEtaRoute(routeConfig));
                    completedCount++;
                    checkAllComplete();
                    return;
                }

                // 嘗試抓取候選站點的九巴第一個有效時間
                var targetStopId = candidates[0].stop;
                var etaUrl = "https://data.etabus.gov.hk/v1/transport/kmb/eta/" + targetStopId + "/" + routeConfig.route + "/" + routeConfig.serviceType;
                
                legacyFetchJson(etaUrl, "KMB ETA", function(etaJson) {
                    var eList = (etaJson && Array.isArray(etaJson.data)) ? etaJson.data : [];
                    var validE = [];
                    for (var k = 0; k < eList.length; k++) {
                        if (eList[k] && eList[k].eta) validE.push(eList[k]);
                    }
                    if (!validE.length) {
                        busResults.push(createNoEtaRoute(routeConfig));
                    } else {
                        validE.sort(function(a,b){
                            var tA = parseEtaTime(a.eta), tB = parseEtaTime(b.eta);
                            return (tA && tB) ? tA - tB : 0;
                        });
                        var mins = getMinutesLeft(validE[0].eta);
                        busResults.push({
                            company: "kmb", route: routeConfig.route, dest: routeConfig.dest,
                            mins: mins, order: routeConfig.order, stopId: targetStopId
                        });
                    }
                    completedCount++;
                    checkAllComplete();
                }, function() {
                    busResults.push(createNoEtaRoute(routeConfig));
                    completedCount++;
                    checkAllComplete();
                });
            }

            // 抓取雙向的路線車站清單
            for (var d = 0; d < directions.length; d++) {
                (function(direction) {
                    var rsUrl = "https://data.etabus.gov.hk/v1/transport/kmb/route-stop/" + routeConfig.route + "/" + direction + "/" + routeConfig.serviceType;
                    legacyFetchJson(rsUrl, "KMB RS", function(rsJson) {
                        var dData = (rsJson && Array.isArray(rsJson.data)) ? rsJson.data : [];
                        allRouteStops = allRouteStops.concat(dData);
                        dirCompleted++;
                        if (dirCompleted === 2) queryKmbEta();
                    }, function() {
                        dirCompleted++;
                        if (dirCompleted === 2) queryKmbEta();
                    });
                })(directions[d]);
            }

        }, function() {
            busResults.push(createNoEtaRoute(routeConfig));
            completedCount++;
            checkAllComplete();
        });
    }

    // 啟動所有巴士排程
    for (var b = 0; b < BUS_ROUTES.length; b++) {
        var routeConfig = BUS_ROUTES[b];
        if (routeConfig.company === "kmb") {
            processKmb(routeConfig);
        } else if (routeConfig.company === "ctb") {
            processCitybus(routeConfig);
        } else {
            busResults.push(createNoEtaRoute(routeConfig));
            completedCount++;
            checkAllComplete();
        }
    }
}

/************************************************************
 * 9. 全局更新排程控制
 ************************************************************/
function updateAllData() {
    var status = document.getElementById("update-status");
    if (status) status.innerText = "正在更新數據...";

    var mtrDone = false;
    var busDone = false;

    function checkBothDone() {
        if (mtrDone && busDone) {
            var now = new Date();
            var hrs = now.getHours(), mins = now.getMinutes(), secs = now.getSeconds();
            if (hrs < 10) hrs = "0" + hrs; if (mins < 10) mins = "0" + mins; if (secs < 10) secs = "0" + secs;
            if (status) status.innerText = "最後更新: " + hrs + ":" + mins + ":" + secs;
        }
    }

    fetchMTR(function() {
        mtrDone = true;
        checkBothDone();
    });

    fetchBus(function() {
        busDone = true;
        checkBothDone();
    });
}

// 啟動排程
updateAllData();
setInterval(updateAllData, REFRESH_INTERVAL);
</script>

</body>
</html>
