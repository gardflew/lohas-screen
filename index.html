<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日出康城實時交通看板 (舊版 Android 鐵血兼容版)</title>

<style>
    body {
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 10px;
        overflow: hidden;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #333;
        padding-bottom: 7px;
        margin-bottom: 10px;
    }

    .title {
        font-size: 18px;
        font-weight: bold;
        color: #d0bfff;
    }

    .clock {
        font-size: 22px;
        font-weight: bold;
        color: #00e5ff;
    }

    .section-title {
        font-size: 14px;
        color: #aaa;
        background: #111;
        padding: 3px 7px;
        border-left: 4px solid #fff;
        margin-top: 10px;
    }

    .mtr-sec {
        border-left-color: #7d4199;
    }

    .bus-sec {
        border-left-color: #ff9f0a;
    }

    .eta-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #222;
        padding: 7px 3px;
    }

    .route-badge {
        font-size: 20px;
        font-weight: bold;
        width: 70px;
        text-align: center;
        border-radius: 4px;
        padding: 1px 0;
    }

    .mtr-badge {
        color: #fff;
        background: #7d4199;
        font-size: 17px;
    }

    .kmb-badge {
        color: #fff;
        background: #ff3b30;
    }

    .ctb-badge {
        color: #000;
        background: #ffd60a;
    }

    .destination {
        font-size: 16px;
        flex-grow: 1;
        margin-left: 10px;
    }

    .time-left {
        font-size: 20px;
        font-weight: bold;
        color: #30d158;
        text-align: right;
        min-width: 150px; /* 增加寬度以容納 hh:mm */
    }

    /* 上車時間 (hh:mm) 的小字體樣式 */
    .eta-clock {
        font-size: 15px;
        color: #00e5ff;
        font-weight: normal;
        margin-left: 5px;
    }

    .no-eta {
        color: #aaa;
        font-size: 17px;
    }

    .status {
        text-align: center;
        color: #666;
        font-size: 10px;
        margin-top: 18px;
    }

    .error {
        color: #ff6b6b;
    }

    .muted {
        color: #aaa;
    }
</style>
</head>

<body>

<div class="header">
    <div class="title">日出康城 LOHAS Park</div>
    <div class="clock" id="current-time">00:00:00</div>
</div>

<!-- 【最安全時鐘】不依賴任何外部函數，確保網頁載入時鐘一定會動 -->
<script>
    function padStartZero(val) {
        var str = String(val);
        return str.length < 2 ? "0" + str : str;
    }

    function updateClockOnly() {
        var now = new Date();
        var timeText = padStartZero(now.getHours()) + ":" +
                       padStartZero(now.getMinutes()) + ":" +
                       padStartZero(now.getSeconds());

        var clockElement = document.getElementById("current-time");
        if (clockElement) {
            clockElement.innerText = timeText;
        }
    }

    updateClockOnly();
    setInterval(updateClockOnly, 1000);
</script>

<div class="section-title mtr-sec">港鐵將軍澳綫（康城站）</div>
<div id="mtr-list">
    <div class="eta-row">
        <div class="destination muted">正在獲取港鐵班次...</div>
    </div>
</div>

<div class="section-title bus-sec">康城開出巴士</div>
<div id="bus-list">
    <div class="eta-row">
        <div class="destination muted">正在獲取巴士班次...</div>
    </div>
</div>

<div class="status" id="update-status">正在初始化...</div>

<script>
/************************************************************
 * 1. 基礎防錯配置 (全面回退至最原始 ES3/5 語法)
 ************************************************************/
window.onerror = function(message, source, lineno) {
    var status = document.getElementById("update-status");
    if (status) {
        status.innerText = "JS 錯誤: " + message + " 行數: " + lineno;
    }
};

var REFRESH_INTERVAL = 30000;
var MTR_API = "https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=TKL&sta=LHP";

var BUS_ROUTES = [
    { company: "kmb", route: "98", serviceType: "1", dir: "O", dest: "將軍澳轉車站 / 牛頭角站", order: 1 },
    { company: "kmb", route: "290X", serviceType: "1", dir: "O", dest: "荃灣西站", order: 2 },
    { company: "kmb", route: "298X", serviceType: "1", dir: "O", dest: "美孚", order: 3 },
    { company: "ctb", route: "790", stopId: "003329", dir: "O", dest: "尖沙咀東", order: 4 },
    { company: "ctb", route: "795", stopId: "003329", dir: "O", dest: "長沙灣", order: 5 },
    { company: "ctb", route: "797", stopId: "003329", dir: "O", dest: "新蒲崗", order: 6 }
];

var LOHAS_KEYWORDS = [
    "康城", "日出", "lohas", "lohas park", "the lohas", "beaumount", 
    "the beaumount", "峻瀅", "首都", "the capitol", "malibu", 
    "wings at sea", "海翩匯", "oscar", "清水灣半島", "mega plus", 
    "wan po", "wan o", "le prestige", "領都", "緻藍天", "shaw studios"
];

var kmbStopListCache = null;
var finalBusResults = [];
var completedBusRequests = 0;

/************************************************************
 * 2. 基礎工具函數
 ************************************************************/
function showMessage(elementId, message, isError) {
    var element = document.getElementById(elementId);
    if (!element) return;
    var className = isError ? "destination error" : "destination muted";
    element.innerHTML = '<div class="eta-row"><div class="' + className + '">' + message + '</div></div>';
}

function parseEtaTime(value) {
    if (!value) return null;
    var date = new Date(value);
    if (isNaN(date.getTime())) return null;
    return date;
}

function getMinutesLeft(etaTime) {
    var targetTime = parseEtaTime(etaTime);
    if (!targetTime) return null;
    return Math.max(0, Math.floor((targetTime - new Date()) / 1000 / 60));
}

// 新增功能：從原始時間格式中提取 HH:mm 字串
function formatEtaClock(rawTimeStr) {
    var t = parseEtaTime(rawTimeStr);
    if (!t) return "";
    return " (" + padStartZero(t.getHours()) + ":" + padStartZero(t.getMinutes()) + ")";
}

function formatMinutes(mins, type) {
    if (mins === null || mins === undefined) return "暫無班次";
    if (mins <= 0) return type === "bus" ? "到站中" : "即將到站";
    return mins + " 分鐘";
}

function containsLohasKeyword(text) {
    var lower = String(text || "").toLowerCase();
    for (var i = 0; i < LOHAS_KEYWORDS.length; i++) {
        if (lower.indexOf(LOHAS_KEYWORDS[i].toLowerCase()) !== -1) {
            return true;
        }
    }
    return false;
}

// 傳統 XMLHttpRequest 回呼封裝
function ajaxGetJson(url, callback) {
    var xhr = new XMLHttpRequest();
    var cacheBuster = url.indexOf("?") === -1 ? "?" : "&";
    cacheBuster += "_t=" + new Date().getTime();
    
    xhr.open("GET", url + cacheBuster, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status >= 200 && xhr.status < 300) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    callback(null, data);
                } catch (e) {
                    callback("Parse Error", null);
                }
            } else {
                callback("HTTP Error " + xhr.status, null);
            }
        }
    };
    xhr.send();
}

/************************************************************
 * 3. 港鐵數據處理 (純 Callback)
 ************************************************************/
function fetchMTR() {
    ajaxGetJson(MTR_API, function(err, json) {
        if (err || !json || !json.data) {
            showMessage("mtr-list", "港鐵資料獲取失敗", true);
            return;
        }

        var stationKey = "";
        for (var k in json.data) {
            if (json.data.hasOwnProperty(k)) {
                stationKey = k;
                break;
            }
        }

        if (!stationKey) {
            showMessage("mtr-list", "港鐵暫無資料", true);
            return;
        }

        var stationData = json.data[stationKey];
        var schedule = [];

        if (stationData.UP && stationData.UP.length > 0) {
            schedule = stationData.UP;
        } else if (stationData.DOWN && stationData.DOWN.length > 0) {
            schedule = stationData.DOWN;
        }

        if (schedule.length === 0) {
            showMessage("mtr-list", "非行車時間 / 暫無港鐵班次");
            return;
        }

        var destinationMap = { "NOP": "北角", "TIK": "調景嶺", "POA": "寶琳", "LHP": "康城" };
        var html = "";
        var displayCount = schedule.length < 3 ? schedule.length : 3;

        for (var i = 0; i < displayCount; i++) {
            var train = schedule[i];
            var mins = (train.ttnt !== undefined && train.ttnt !== "") ? parseInt(train.ttnt, 10) : getMinutesLeft(train.time);
            if (mins === null || isNaN(mins)) mins = 0;
            var dest = destinationMap[train.dest] || train.dest || "未能確認";
            
            // 港鐵的實時到站時間 (若沒給原始字串，就用目前的實際時間加上倒數分鐘算出)
            var clockStr = "";
            if (train.time) {
                clockStr = formatEtaClock(train.time);
            } else {
                var futureDate = new Date();
                futureDate.setMinutes(futureDate.getMinutes() + mins);
                clockStr = " (" + padStartZero(futureDate.getHours()) + ":" + padStartZero(futureDate.getMinutes()) + ")";
            }

            html += '<div class="eta-row">' +
                    '<div class="route-badge mtr-badge">MTR</div>' +
                    '<div class="destination">往 ' + dest + '</div>' +
                    '<div class="time-left">' + formatMinutes(mins, "mtr") + '<span class="eta-clock">' + clockStr + '</span></div>' +
                    '</div>';
        }
        document.getElementById("mtr-list").innerHTML = html;
    });
}

/************************************************************
 * 4. 巴士數據處理與傳統排序渲染
 ************************************************************/
function createNoEtaRoute(routeConfig) {
    return {
        company: routeConfig.company,
        route: routeConfig.route,
        dest: routeConfig.dest,
        mins: null,
        rawTime: null,
        order: routeConfig.order,
        stopId: routeConfig.stopId || null
    };
}

function renderBusList() {
    for (var i = 0; i < finalBusResults.length - 1; i++) {
        for (var j = 0; j < finalBusResults.length - 1 - i; j++) {
            if (finalBusResults[j].order > finalBusResults[j + 1].order) {
                var temp = finalBusResults[j];
                finalBusResults[j] = finalBusResults[j + 1];
                finalBusResults[j + 1] = temp;
            }
        }
    }

    var html = "";
    for (var k = 0; k < finalBusResults.length; k++) {
        var bus = finalBusResults[k];
        var badgeClass = bus.company === "kmb" ? "kmb-badge" : "ctb-badge";
        var timeClass = (bus.mins === null || bus.mins === undefined) ? "time-left no-eta" : "time-left";
        
        var clockStr = (bus.mins !== null && bus.rawTime) ? formatEtaClock(bus.rawTime) : "";

        html += '<div class="eta-row">' +
                '<div class="route-badge ' + badgeClass + '">' + bus.route + '</div>' +
                '<div class="destination">往 ' + bus.dest + '</div>' +
                '<div class="' + timeClass + '">' + formatMinutes(bus.mins, "bus") + '<span class="eta-clock">' + clockStr + '</span></div>' +
                '</div>';
    }
    document.getElementById("bus-list").innerHTML = html;
}

function checkBusRequestsComplete() {
    if (completedBusRequests >= BUS_ROUTES.length) {
        renderBusList();
        var status = document.getElementById("update-status");
        var now = new Date();
        if (status) {
            status.innerText = "最後更新: " + padStartZero(now.getHours()) + ":" + padStartZero(now.getMinutes()) + ":" + padStartZero(now.getSeconds());
        }
    }
}

/************************************************************
 * 5. 九巴自動配對站點（純手動迴圈，精準過濾落客站）
 ************************************************************/
function getKmbStopList(callback) {
    if (kmbStopListCache) {
        callback(kmbStopListCache);
        return;
    }
    ajaxGetJson("https://data.etabus.gov.hk/v1/transport/kmb/stop", function(err, json) {
        kmbStopListCache = (json && Array.isArray(json.data)) ? json.data : [];
        callback(kmbStopListCache);
    });
}

function findKmbCandidateStops(routeConfig, callback) {
    var targetDirection = routeConfig.dir === "O" ? "outbound" : "inbound";
    var url = "https://data.etabus.gov.hk/v1/transport/kmb/route-stop/" + routeConfig.route + "/" + targetDirection + "/" + routeConfig.serviceType;

    getKmbStopList(function(stopList) {
        ajaxGetJson(url, function(err, rJson) {
            var routeStops = (rJson && Array.isArray(rJson.data)) ? rJson.data : [];

            var stopMap = {};
            for (var i = 0; i < stopList.length; i++) {
                if (stopList[i].stop) stopMap[stopList[i].stop] = stopList[i];
            }

            var mapped = [];
            var seenStops = {};
            for (var j = 0; j < routeStops.length; j++) {
                var sId = routeStops[j].stop || routeStops[j].stop_id;
                if (!sId || seenStops[sId]) continue;
                seenStops[sId] = true;

                var stopInfo = stopMap[sId] || {};
                mapped.push({
                    stop: sId,
                    name_tc: stopInfo.name_tc || "",
                    name_en: stopInfo.name_en || ""
                });
            }

            var candidates = [];
            for (var k = 0; k < mapped.length; k++) {
                if (containsLohasKeyword(mapped[k].name_tc + " " + mapped[k].name_en)) {
                    candidates.push(mapped[k]);
                }
            }

            callback(candidates.length > 0 ? candidates : mapped);
        });
    });
}

function fetchKmbEta(routeConfig, stopId, callback) {
    var url = "https://data.etabus.gov.hk/v1/transport/kmb/eta/" + stopId + "/" + routeConfig.route + "/" + routeConfig.serviceType;
    ajaxGetJson(url, function(err, json) {
        var rawList = (json && Array.isArray(json.data)) ? json.data : [];
        
        var list = [];
        for (var i = 0; i < rawList.length; i++) {
            if (rawList[i] && rawList[i].eta && rawList[i].dir === routeConfig.dir) {
                list.push(rawList[i]);
            }
        }

        if (list.length === 0) {
            callback(null);
            return;
        }

        for (var m = 0; m < list.length - 1; m++) {
            for (var n = 0; n < list.length - 1 - m; n++) {
                var tA = parseEtaTime(list[n].eta);
                var tB = parseEtaTime(list[n + 1].eta);
                if (tA && tB && tA > tB) {
                    var temp = list[n];
                    list[n] = list[n + 1];
                    list[n + 1] = temp;
                }
            }
        }

        var mins = getMinutesLeft(list[0].eta);
        if (mins === null) {
            callback(null);
            return;
        }

        callback({
            company: "kmb",
            route: routeConfig.route,
            dest: routeConfig.dest,
            mins: mins,
            rawTime: list[0].eta,
            order: routeConfig.order,
            stopId: stopId
        });
    });
}

function fetchOneKmbRoute(routeConfig) {
    findKmbCandidateStops(routeConfig, function(candidates) {
        if (candidates.length === 0) {
            finalBusResults.push(createNoEtaRoute(routeConfig));
            completedBusRequests++;
            checkBusRequestsComplete();
            return;
        }
        
        function tryNext(index) {
            if (index >= candidates.length) {
                finalBusResults.push(createNoEtaRoute(routeConfig));
                completedBusRequests++;
                checkBusRequestsComplete();
                return;
            }

            fetchKmbEta(routeConfig, candidates[index].stop, function(etaResult) {
                if (etaResult) {
                    finalBusResults.push(etaResult);
                    completedBusRequests++;
                    checkBusRequestsComplete();
                } else {
                    tryNext(index + 1);
                }
            });
        }
        tryNext(0);
    });
}

/************************************************************
 * 6. 城巴數據獲取（純手動過濾方向）
 ************************************************************/
function fetchCitybusEta(routeConfig) {
    var url = "https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/" + routeConfig.stopId + "/" + routeConfig.route;
    ajaxGetJson(url, function(err, json) {
        var rawList = (json && Array.isArray(json.data)) ? json.data : [];
        
        var list = [];
        for (var i = 0; i < rawList.length; i++) {
            if (rawList[i] && rawList[i].eta && rawList[i].dir === routeConfig.dir) {
                list.push(rawList[i]);
            }
        }

        if (list.length === 0) {
            finalBusResults.push(createNoEtaRoute(routeConfig));
            completedBusRequests++;
            checkBusRequestsComplete();
            return;
        }

        for (var m = 0; m < list.length - 1; m++) {
            for (var n = 0; n < list.length - 1 - m; n++) {
                var tA = parseEtaTime(list[n].eta);
                var tB = parseEtaTime(list[n + 1].eta);
                if (tA && tB && tA > tB) {
                    var temp = list[n];
                    list[n] = list[n + 1];
                    list[n + 1] = temp;
                }
            }
        }

        var mins = getMinutesLeft(list[0].eta);
        if (mins === null) {
            finalBusResults.push(createNoEtaRoute(routeConfig));
        } else {
            finalBusResults.push({
                company: "ctb",
                route: routeConfig.route,
                dest: routeConfig.dest,
                mins: mins,
                rawTime: list[0].eta,
                order: routeConfig.order,
                stopId: routeConfig.stopId
            });
        }
        completedBusRequests++;
        checkBusRequestsComplete();
    });
}

/************************************************************
 * 7. 總調度與控制
 ************************************************************/
function updateAllData() {
    var status = document.getElementById("update-status");
    if (status) status.innerText = "正在更新數據...";

    finalBusResults = [];
    completedBusRequests = 0;

    fetchMTR();

    for (var i = 0; i < BUS_ROUTES.length; i++) {
        var rConfig = BUS_ROUTES[i];
        if (rConfig.company === "kmb") {
            fetchOneKmbRoute(rConfig);
        } else if (rConfig.company === "ctb") {
            fetchCitybusEta(rConfig);
        }
    }
}

updateAllData();
setInterval(updateAllData, REFRESH_INTERVAL);
</script>

</body>
</html>
